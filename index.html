<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeGeometry - Audio Visualizer</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" href="/logo.png" type="image/png" />
  </head>
  <body>
    <!-- Toggle Button -->
    <button id="ui-toggle" aria-label="Toggle UI">
      <i data-lucide="menu"></i>
    </button>

    <!-- Main UI Container -->
    <div id="ui" class="visible">
      <div class="ui-header">
        <h1>VibeGeometry</h1>
        <span class="version">v1.0</span>
      </div>

      <!-- Upload Section -->
      <div id="upload-section">
        <label for="audio-input" class="upload-area">
          <i data-lucide="music"></i>
          <span>Audio hochladen</span>
          <small>MP3, WAV, OGG</small>
        </label>
        <input type="file" id="audio-input" accept="audio/*" />
      </div>

      <!-- Controls Section -->
      <div id="controls" class="hidden">
        <!-- Track Info -->
        <div id="track-info">
          <div class="track-name">Kein Track</div>
          <div class="track-time">
            <span id="current-time">0:00</span>
            <span id="duration">0:00</span>
          </div>
        </div>

        <!-- Seek Bar -->
        <div class="seek-container">
          <input
            type="range"
            id="seek-bar"
            min="0"
            max="100"
            step="0.1"
            value="0"
            aria-label="Seek"
          />
          <div class="seek-progress"></div>
        </div>

        <!-- Playback Controls -->
        <div class="playback-controls">
          <button id="rewind" aria-label="Rewind">
            <i data-lucide="skip-back"></i>
          </button>
          <button id="play-pause" class="play-button" aria-label="Play/Pause">
            <i data-lucide="play"></i>
          </button>
          <button id="fast-forward" aria-label="Fast Forward">
            <i data-lucide="skip-forward"></i>
          </button>
        </div>

        <!-- Volume Control -->
        <div class="volume-control">
          <i data-lucide="volume-2" class="volume-icon"></i>
          <input
            type="range"
            id="volume-slider"
            min="0"
            max="1"
            step="0.01"
            value="0.5"
            aria-label="Volume"
          />
          <span class="volume-value">50%</span>
        </div>
      </div>
    </div>

    <canvas id="bg"></canvas>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="main.js"></script>
  </body>
</html>
